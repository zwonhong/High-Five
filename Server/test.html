<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소켓 입장 테스트</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .connected { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .disconnected { background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .info { font-size: 1.2em; font-weight: bold; }
        #log { background: #f5f5f5; padding: 10px; border: 1px solid #ddd; height: 200px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <h1>High-Five 서버 입장 테스트</h1>
    
    <div id="statusBox" class="status-box disconnected">
        상태: <span id="statusText">연결 시도 중...</span>
    </div>

    <p class="info">현재 방 인원: <span id="userCount">0</span> / 5</p>

    <h3>실시간 로그</h3>
    <div id="log"></div>

    <script>
        const logDiv = document.getElementById('log');
        const userCountSpan = document.getElementById('userCount');
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');

        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 1. 서버 접속 (app.js에서 설정한 포트 3000) Connect to the server (port 3000 as set in app.js)
        // CORs 설정이 origin: "*"이어야 함 CORs setting must be origin: "*"
        const socket = io("http://localhost:3000");

        // 연결 성공 시 If connection is successful
        socket.on("connect", () => {
            statusBox.className = "status-box connected";
            statusText.innerText = "연결됨 (ID: " + socket.id + ")";
            addLog("서버에 연결되었습니다.");
        });

        // 인원수 업데이트 수신 Receive user count updates
        socket.on("user_count_update", (count) => {
            userCountSpan.innerText = count;
            addLog(`현재 인원 업데이트: ${count}명`);
        });

        // 5명 초과 시 서버에서 보내는 에러 메시지 Receive error messages when trying to enter a full room
        socket.on("error_message", (msg) => {
            alert("⚠️ " + msg);
            addLog("에러 발생: " + msg);
        });

        // 연결 끊김 시 If disconnected
        socket.on("disconnect", (reason) => {
            statusBox.className = "status-box disconnected";
            statusText.innerText = "연결 끊김 (" + reason + ")";
            addLog("서버와 연결이 끊겼습니다.");
        });
    </script>
</body>
</html>
